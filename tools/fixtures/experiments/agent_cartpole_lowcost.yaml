version: 1
experiment_name: cartpole_agent_lowcost
objective: >
  Improve CartPole reward behavior quickly with strict token and compute limits.

initialization:
  mode: human

environment:
  backend: gymnasium
  id: CartPole-v1
  seed: 11

baseline_reward:
  mode: file
  path: tools/fixtures/rewards/cartpole_baseline.py
  entrypoint_name: compute_reward

models:
  controller:
    model: gpt-5-nano
    reasoning_effort: low
    max_completion_tokens: 2000
  reward_designer:
    model: gpt-5-nano
    reasoning_effort: low
    max_completion_tokens: 2000
  analyzer:
    model: gpt-5-nano
    reasoning_effort: minimal
    max_completion_tokens: 1000

budgets:
  api:
    max_total_tokens: 30000
    max_total_usd: 0.5
    max_completion_tokens_per_call: 4000
  time:
    max_wall_clock_minutes: 30
  compute:
    max_experiments: 6
    max_total_train_timesteps: 0
    max_reward_generations: 6
    max_parallel_experiments: 1

governance:
  stopping:
    max_iterations: 6
    plateau_window: 2
    min_relative_improvement: 0.01
    max_no_improve_streak: 2
    max_failed_actions: 2
  human_feedback:
    allow: false
    feedback_gate: none
    max_requests: 0

tool_policy:
  allowed_tools:
    - run_experiment
    - summarize_run_artifacts
    - propose_reward_revision
    - validate_reward_program
    - compare_candidates
    - estimate_cost_and_risk
    - stop_or_continue_recommendation
  default_timeout_seconds: 900
  max_retries_per_tool: 1

agent_loop:
  encourage_run_all_after_each_experiment: false
  samples_per_iteration: 1
  enforce_progress_before_stop: true

execution:
  rollout:
    max_episode_steps: 200
  comparison:
    enabled: true
    human_reward_path: tools/fixtures/rewards/cartpole_baseline.py
    sparse_reward_path: tools/fixtures/rewards/cartpole_sparse.py
    entrypoint_name: compute_reward
    num_eval_runs: 3
    seed_start: 2000
    probe_run_count: 2
    probe_seed_start: 3000

outputs:
  runtime_dir: .rewardlab
  report_detail: summary
  save_decision_trace: true

