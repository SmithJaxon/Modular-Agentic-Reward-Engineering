version: 1
experiment_name: humanoid_agent_balanced
objective: >
  Optimize a Gymnasium Humanoid reward for fast, stable forward locomotion.
  Prioritize reliable improvement with moderate API and compute spend.

environment:
  backend: gymnasium
  id: Humanoid-v4
  seed: 42

baseline_reward:
  mode: file
  path: tools/fixtures/rewards/humanoid_baseline.py
  entrypoint_name: reward

models:
  controller:
    model: gpt-5-mini
    reasoning_effort: high
    max_completion_tokens: 64000
  reward_designer:
    model: gpt-5-mini
    reasoning_effort: high
    max_completion_tokens: 64000
  analyzer:
    model: gpt-5-nano
    reasoning_effort: low
    max_completion_tokens: 4000

budgets:
  api:
    max_total_tokens: 250000
    max_total_usd: 10.0
    max_completion_tokens_per_call: 128000
  time:
    max_wall_clock_minutes: 240
  compute:
    max_experiments: 10
    max_total_train_timesteps: 500000
    max_reward_generations: 24
    max_parallel_experiments: 1

governance:
  stopping:
    max_iterations: 8
    plateau_window: 3
    min_relative_improvement: 0.02
    max_no_improve_streak: 3
    max_failed_actions: 3
  human_feedback:
    allow: false
    feedback_gate: none
    max_requests: 0

tool_policy:
  allowed_tools:
    - run_experiment
    - run_robustness_probes
    - summarize_run_artifacts
    - propose_reward_revision
    - validate_reward_program
    - compare_candidates
    - estimate_cost_and_risk
    - stop_or_continue_recommendation
  default_timeout_seconds: 3600
  max_retries_per_tool: 2

agent_loop:
  encourage_run_all_after_each_experiment: true
  samples_per_iteration: 4
  enforce_progress_before_stop: true

execution:
  ppo:
    total_timesteps: 50000
    eval_runs: 5
    checkpoint_count: 10
    eval_episodes_per_checkpoint: 1

outputs:
  runtime_dir: .rewardlab
  report_detail: full
  save_decision_trace: true

