version: 1
run_name: humanoid_scout

environment:
  backend: gymnasium
  id: Humanoid-v4
  seed: 7

objective:
  text_file: tools/fixtures/objectives/humanoid.txt
  baseline_reward_file: tools/fixtures/rewards/humanoid_baseline.py

agent:
  primary_model: gpt-5.4-mini
  reasoning_effort: medium
  fallback_model: gpt-4o-mini
  planner_provider: heuristic
  planner_context_window: 12
  planner_max_output_tokens: 1200

tools:
  enabled:
    - run_experiment
    - run_probe_suite
    - compare_candidates
    - read_artifact
    - export_report
  max_parallel_workers: 2
  per_call_timeout_seconds: 1200

decision:
  max_turns: 20
  min_candidates_before_compare: 2
  compare_every_new_candidates: 2
  require_probe_before_compare: true

budgets:
  hard:
    max_wall_clock_minutes: 45
    max_training_timesteps: 250000
    max_evaluation_episodes: 30
    max_api_input_tokens: 500000
    max_api_output_tokens: 120000
    max_api_usd: 8.0
    max_calls_per_model:
      gpt-5.4-mini: 20
      gpt-4o-mini: 10
  soft:
    target_env_return: 0.9
    plateau_window_turns: 3
    min_delta_return: 0.01
    min_gain_per_1k_usd: 3.0
    risk_ceiling: high

training_defaults:
  execution_mode: deterministic
  ppo_num_envs: 1
  ppo_total_timesteps: 4096
  ppo_n_steps: 128
  ppo_batch_size: 128
  ppo_learning_rate: 0.0003
  evaluation_episodes: 5
  reflection_episodes: 2
  reflection_interval_steps: 1024
  llm_provider: none
  llm_model: gpt-5.4-mini

reporting:
  save_decision_trace: true
  save_tool_trace: true
  save_budget_ledger: true
