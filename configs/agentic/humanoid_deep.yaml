version: 1
run_name: humanoid_deep

environment:
  backend: gymnasium
  id: Humanoid-v4
  seed: 7

objective:
  text_file: tools/fixtures/objectives/humanoid.txt
  baseline_reward_file: tools/fixtures/rewards/humanoid_baseline.py

agent:
  primary_model: gpt-5.4-mini
  reasoning_effort: high
  fallback_model: gpt-4o-mini
  planner_provider: heuristic
  planner_context_window: 24
  planner_max_output_tokens: 1800

tools:
  enabled:
    - run_experiment
    - run_probe_suite
    - compare_candidates
    - read_artifact
    - export_report
  max_parallel_workers: 4
  per_call_timeout_seconds: 2400

decision:
  max_turns: 40
  min_candidates_before_compare: 2
  compare_every_new_candidates: 3
  require_probe_before_compare: true

budgets:
  hard:
    max_wall_clock_minutes: 360
    max_training_timesteps: 3000000
    max_evaluation_episodes: 350
    max_api_input_tokens: 6000000
    max_api_output_tokens: 1500000
    max_api_usd: 120.0
    max_calls_per_model:
      gpt-5.4-mini: 180
      gpt-4o-mini: 60
  soft:
    target_env_return: 0.98
    plateau_window_turns: 8
    min_delta_return: 0.005
    min_gain_per_1k_usd: 0.6
    risk_ceiling: medium

training_defaults:
  execution_mode: deterministic
  ppo_num_envs: 1
  ppo_total_timesteps: 4096
  ppo_n_steps: 128
  ppo_batch_size: 128
  ppo_learning_rate: 0.0002
  evaluation_episodes: 5
  reflection_episodes: 2
  reflection_interval_steps: 1024
  llm_provider: none
  llm_model: gpt-5.4-mini

reporting:
  save_decision_trace: true
  save_tool_trace: true
  save_budget_ledger: true
